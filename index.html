<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中山美食地圖</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        img[usemap] { max-width: 100%; height: auto; }
        /* 隱藏原生下拉選單箭頭，使用自訂樣式更美觀 */
        select { -webkit-appearance: none; -moz-appearance: none; appearance: none; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen pb-10">

    <!-- 頂部 Header -->
    <header class="bg-orange-500 text-white p-4 shadow-md sticky top-0 z-30">
        <div class="max-w-4xl mx-auto flex justify-between items-center gap-2">
            <h1 class="text-lg md:text-xl font-bold whitespace-nowrap">中山美食地圖</h1>
            <input type="text" id="searchInput" placeholder="搜尋餐廳名或特色..." 
                   class="px-3 py-1.5 rounded-full text-gray-800 focus:outline-none w-full text-sm">
        </div>
    </header>

    <!-- 視覺地圖區 -->
    <div class="bg-white max-w-4xl mx-auto border-b border-gray-200 text-center relative">
        <img src="image.png" alt="中山分區地圖" usemap="#image-map" id="visualMap" class="mx-auto">
        <p class="text-[10px] text-gray-400 py-1">點擊地圖文字選擇地區</p>

        <!-- 精準坐標 Image Map -->
        <map name="image-map">
            <area shape="rect" coords="206,296,249,312" alt="西區" href="javascript:void(0);" onclick="setDistrict('西區')">
            <area shape="rect" coords="249,319,302,336" alt="石岐區" href="javascript:void(0);" onclick="setDistrict('石岐區')">
            <area shape="rect" coords="328,321,411,337" alt="火炬開發區" href="javascript:void(0);" onclick="setDistrict('火炬開發區')">
            <area shape="rect" coords="264,359,318,381" alt="東區" href="javascript:void(0);" onclick="setDistrict('東區')">
            <area shape="rect" coords="213,402,260,425" alt="南區" href="javascript:void(0);" onclick="setDistrict('南區')">
            <area shape="rect" coords="394,381,443,395" alt="南朗鎮" href="javascript:void(0);" onclick="setDistrict('南朗鎮')">
            <area shape="rect" coords="169,354,222,373" alt="沙溪鎮" href="javascript:void(0);" onclick="setDistrict('沙溪鎮')">
            <area shape="rect" coords="94,198,141,217" alt="小欖鎮" href="javascript:void(0);" onclick="setDistrict('小欖鎮')">
            <area shape="rect" coords="310,161,358,178" alt="三角鎮" href="javascript:void(0);" onclick="setDistrict('三角鎮')">
            <area shape="rect" coords="297,546,352,562" alt="三鄉鎮" href="javascript:void(0);" onclick="setDistrict('三鄉鎮')">
            <area shape="rect" coords="260,263,307,276" alt="港口鎮" href="javascript:void(0);" onclick="setDistrict('港口鎮')">
            <area shape="rect" coords="240,123,290,133" alt="黃圃鎮" href="javascript:void(0);" onclick="setDistrict('黃圃鎮')">
            <area shape="rect" coords="131,158,179,174" alt="東鳳鎮" href="javascript:void(0);" onclick="setDistrict('東鳳鎮')">
            <area shape="rect" coords="291,466,351,478" alt="五桂山鎮" href="javascript:void(0);" onclick="setDistrict('五桂山鎮')">
            <area shape="rect" coords="151,124,193,135" alt="南頭鎮" href="javascript:void(0);" onclick="setDistrict('南頭鎮')">
            <area shape="rect" coords="299,632,352,650" alt="坦洲鎮" href="javascript:void(0);" onclick="setDistrict('坦洲鎮')">
            <area shape="rect" coords="165,251,215,267" alt="東升鎮" href="javascript:void(0);" onclick="setDistrict('東升鎮')">
            <area shape="rect" coords="48,238,93,250" alt="古鎮鎮" href="javascript:void(0);" onclick="setDistrict('古鎮鎮')">
            <area shape="rect" coords="86,317,137,332" alt="橫欄鎮" href="javascript:void(0);" onclick="setDistrict('橫欄鎮')">
            <area shape="rect" coords="218,185,266,203" alt="阜沙鎮" href="javascript:void(0);" onclick="setDistrict('阜沙鎮')">
            <area shape="rect" coords="379,227,425,245" alt="民眾鎮" href="javascript:void(0);" onclick="setDistrict('民眾鎮')">
            <area shape="rect" coords="486,292,533,311" alt="馬鞍島" href="javascript:void(0);" onclick="setDistrict('馬鞍島')">
            <area shape="rect" coords="138,403,187,419" alt="大涌鎮" href="javascript:void(0);" onclick="setDistrict('大涌鎮')">
            <area shape="rect" coords="183,486,234,508" alt="板芙鎮" href="javascript:void(0);" onclick="setDistrict('板芙鎮')">
            <area shape="rect" coords="225,584,277,605" alt="神灣鎮" href="javascript:void(0);" onclick="setDistrict('神灣鎮')">
        </map>
    </div>

    <!-- 多重篩選欄 (地區、菜式、價錢) -->
    <div class="bg-white shadow-md sticky top-[60px] md:top-[64px] z-20 border-b border-gray-100">
        <div class="max-w-4xl mx-auto px-4 py-3 flex gap-2 overflow-x-auto no-scrollbar">
            
            <!-- 地區下拉選單 -->
            <div class="relative min-w-[100px]">
                <select id="filterDistrict" class="w-full bg-gray-100 text-gray-700 text-sm rounded-lg px-3 py-2 pr-8 focus:outline-none focus:ring-2 focus:ring-orange-300 font-medium cursor-pointer">
                    <option value="全部">所有地區</option>
                    <!-- 自動生成 25 區 -->
                </select>
                <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-500">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </div>
            </div>

            <!-- 菜式下拉選單 -->
            <div class="relative min-w-[110px]">
                <select id="filterCategory" class="w-full bg-gray-100 text-gray-700 text-sm rounded-lg px-3 py-2 pr-8 focus:outline-none focus:ring-2 focus:ring-orange-300 font-medium cursor-pointer">
                    <option value="全部">所有菜式</option>
                    <!-- JavaScript 自動生成 -->
                </select>
                <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-500">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </div>
            </div>

            <!-- 價錢下拉選單 -->
            <div class="relative min-w-[120px]">
                <select id="filterPrice" class="w-full bg-gray-100 text-gray-700 text-sm rounded-lg px-3 py-2 pr-8 focus:outline-none focus:ring-2 focus:ring-orange-300 font-medium cursor-pointer">
                    <option value="全部">所有人均</option>
                    <option value="0-50">¥50 或以下</option>
                    <option value="51-100">¥51 - ¥100</option>
                    <option value="101-200">¥101 - ¥200</option>
                    <option value="201-">¥200 以上</option>
                </select>
                <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-500">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </div>
            </div>
            
            <!-- 重設按鈕 -->
            <button onclick="resetFilters()" class="min-w-[60px] text-xs text-orange-500 hover:bg-orange-50 font-bold px-2 py-2 rounded-lg transition">重設</button>

        </div>
    </div>

    <!-- 列表內容 -->
    <main class="max-w-4xl mx-auto p-4">
        <div id="loader" class="text-center py-10 text-gray-500 font-medium italic">正在載入中山美食數據...</div>
        <div id="resultCount" class="text-xs text-gray-400 mb-3 ml-1 hidden"></div>
        <div id="restaurantGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
    </main>

    <footer class="text-center py-8 text-gray-400 text-[10px]">
        <p>© 2026 中山美食地圖 | 兼容所有手機型號</p>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/image-map-resizer/1.0.10/js/imageMapResizer.min.js"></script>
    <script>
        const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTtli5qEDucHqpfVOHASkAfbxHIeC7_krqoVPnrRA1b83VfdqaAnlHNPmLKkwJyLpPC1O7AHr5wFQg7/pub?output=csv';
        let allData = [];

        const ALL_DISTRICTS = [
            "石岐區", "東區", "西區", "南區", "五桂山鎮", "火炬開發區", "馬鞍島",
            "黃圃鎮", "南頭鎮", "東鳳鎮", "阜沙鎮", "小欖鎮", "東升鎮", "古鎮鎮",
            "橫欄鎮", "三角鎮", "民眾鎮", "南朗鎮", "港口鎮", "大涌鎮", "沙溪鎮",
            "三鄉鎮", "板芙鎮", "神灣鎮", "坦洲鎮"
        ];

        // 綁定三個下拉選單的事件
        const districtSelect = document.getElementById('filterDistrict');
        const categorySelect = document.getElementById('filterCategory');
        const priceSelect = document.getElementById('filterPrice');
        const searchInput = document.getElementById('searchInput');

        districtSelect.addEventListener('change', applyFilters);
        categorySelect.addEventListener('change', applyFilters);
        priceSelect.addEventListener('change', applyFilters);
        searchInput.addEventListener('input', applyFilters);

        async function init() {
            Papa.parse(sheetUrl, {
                download: true,
                header: true,
                complete: function(results) {
                    allData = results.data.filter(item => item['Restaurant Name'] && item['Restaurant Name'].trim() !== ''); 
                    populateDropdowns(allData);
                    renderData(allData);
                    document.getElementById('loader').classList.add('hidden');
                    imageMapResize(); 
                }
            });
        }

        // 填充下拉選單選項
        function populateDropdowns(data) {
            // 填充地區
            ALL_DISTRICTS.forEach(d => {
                let opt = document.createElement('option');
                opt.value = d;
                opt.innerHTML = d;
                districtSelect.appendChild(opt);
            });

            // 動態提取並填充菜式
            const categories = [...new Set(data.map(item => item['Category']?.trim()))].filter(Boolean).sort();
            categories.forEach(c => {
                let opt = document.createElement('option');
                opt.value = c;
                opt.innerHTML = c;
                categorySelect.appendChild(opt);
            });
        }

        // 地圖點擊連動
        window.setDistrict = function(districtName) {
            districtSelect.value = districtName;
            applyFilters();
            // 輕微滾動讓列表顯示
            document.getElementById('filterDistrict').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        // 重設所有條件
        window.resetFilters = function() {
            districtSelect.value = '全部';
            categorySelect.value = '全部';
            priceSelect.value = '全部';
            searchInput.value = '';
            applyFilters();
        }

        // 提取價錢數字的輔助函數
        function extractPrice(priceStr) {
            if (!priceStr) return null;
            // 尋找字串中的數字，例如從 "¥41-100" 提取 "41" 和 "100"
            const matches = priceStr.match(/\d+/g);
            if (matches && matches.length > 0) {
                // 如果是範圍，取平均值或最高值作為參考。這裡我們簡單取第一個數字作為判斷基準
                // 如果格式是 "¥41-100"，我們取 100 以防止用家超支
                return parseInt(matches[matches.length - 1], 10);
            }
            return null;
        }

        function applyFilters() {
            const term = searchInput.value.toLowerCase();
            const selDistrict = districtSelect.value;
            const selCategory = categorySelect.value;
            const selPrice = priceSelect.value;

            const filtered = allData.filter(item => {
                // 1. 地區匹配
                const matchD = selDistrict === '全部' || item['District'] === selDistrict;
                
                // 2. 菜式匹配
                const matchC = selCategory === '全部' || item['Category'] === selCategory;
                
                // 3. 搜尋匹配
                const matchS = item['Restaurant Name'].toLowerCase().includes(term) || 
                               (item['Highlight'] && item['Highlight'].toLowerCase().includes(term));
                
                // 4. 價錢匹配
                let matchP = true;
                if (selPrice !== '全部') {
                    const priceVal = extractPrice(item['Avg Cost']);
                    if (priceVal === null) {
                        // 如果資料沒有價錢，且用家選擇了特定價錢區間，則隱藏該餐廳 (可選策略)
                        matchP = false; 
                    } else {
                        if (selPrice === '0-50') matchP = priceVal <= 50;
                        else if (selPrice === '51-100') matchP = priceVal >= 51 && priceVal <= 100;
                        else if (selPrice === '101-200') matchP = priceVal >= 101 && priceVal <= 200;
                        else if (selPrice === '201-') matchP = priceVal > 200;
                    }
                }

                return matchD && matchC && matchS && matchP;
            });

            renderData(filtered);
        }

   function renderData(data) {
    const container = document.getElementById('restaurantGrid');
    const countDisplay = document.getElementById('resultCount');
    
    countDisplay.classList.remove('hidden');
    countDisplay.innerHTML = `搵到 ${data.length} 間餐廳`;

    if (data.length === 0) {
        container.innerHTML = `<div class="col-span-full text-center text-gray-400 py-12 bg-white rounded-xl shadow-sm border border-gray-100"><p class="text-lg mb-2">🍽️</p>搵唔到符合條件嘅餐廳<br><button onclick="resetFilters()" class="text-orange-500 underline mt-2">重新搜尋</button></div>`;
        return;
    }

    container.innerHTML = data.map(item => {
        // 將餐廳名稱進行編碼，防止特殊字符導致連結失效
        const encodedName = encodeURIComponent(item['Restaurant Name'] + " 中山");
        const xhsUrl = `https://www.xiaohongshu.com/search_result?keyword=${encodedName}`;
        const douyinUrl = `https://www.douyin.com/search/${encodedName}`;

        return `
        <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex flex-col justify-between">
            <div>
                <div class="flex justify-between items-start">
                    <h2 class="text-base font-bold text-gray-800">${item['Restaurant Name']}</h2>
                    <span class="bg-orange-50 text-orange-600 text-[10px] px-2 py-0.5 rounded font-bold whitespace-nowrap ml-2">${item['District']}</span>
                </div>
                <div class="mt-2 flex flex-wrap gap-1">
                    ${item['Category'] ? `<span class="bg-gray-100 text-gray-600 text-[10px] px-1.5 py-0.5 rounded">${item['Category']}</span>` : ''}
                    ${item['Avg Cost'] ? `<span class="bg-blue-50 text-blue-600 text-[10px] px-1.5 py-0.5 rounded font-medium">人均: ${item['Avg Cost']}</span>` : ''}
                </div>
                <p class="text-gray-600 text-xs mt-3 leading-relaxed">● ${item['Highlight'] || '暫無描述'}</p>
            </div>
            
            <div class="mt-4 pt-3 border-t border-gray-50 flex flex-wrap gap-2 items-center justify-between">
                <div class="flex gap-2">
                    <a href="${xhsUrl}" target="_blank" class="flex items-center bg-red-50 text-red-600 text-[10px] font-bold px-2 py-1 rounded transition hover:bg-red-100">
                        <span class="mr-1">📕</span>小紅書
                    </a>
                    <a href="${douyinUrl}" target="_blank" class="flex items-center bg-gray-900 text-white text-[10px] font-bold px-2 py-1 rounded transition hover:bg-black">
                        <span class="mr-1">🎵</span>抖音
                    </a>
                </div>

                ${item['Amap URL'] ? `
                    <a href="${item['Amap URL']}" target="_blank" class="inline-flex items-center text-orange-600 text-[10px] font-bold px-2 py-1 border border-orange-200 rounded-lg hover:bg-orange-50 transition">
                        📍 導航
                    </a>
                ` : ''}
            </div>
        </div>
        `;
    }).join('');
}


        init();
    </script>
</body>
</html>
