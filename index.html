<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中山美食地圖</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        img[usemap] { max-width: 100%; height: auto; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <!-- 頂部 Header -->
    <header class="bg-orange-500 text-white p-4 shadow-md sticky top-0 z-20">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold">中山美食地圖</h1>
            <input type="text" id="searchInput" placeholder="搜尋餐廳或美食..." 
                   class="px-3 py-1 rounded-full text-gray-800 focus:outline-none w-2/5 text-sm">
        </div>
    </header>

    <!-- 視覺地圖區 -->
    <div class="bg-white max-w-4xl mx-auto border-b border-gray-200 text-center relative">
        <img src="image.png" alt="中山分區地圖" usemap="#image-map" id="visualMap" class="mx-auto">
        <p class="text-[10px] text-gray-400 py-1">請直接點擊地圖文字進行篩選</p>

        <!-- 採用你提供的精準坐標 -->
        <map name="image-map">
            <area shape="rect" coords="206,296,249,312" alt="西區" href="javascript:void(0);" onclick="filterByDistrict('西區')">
            <area shape="rect" coords="249,319,302,336" alt="石岐區" href="javascript:void(0);" onclick="filterByDistrict('石岐區')">
            <area shape="rect" coords="328,321,411,337" alt="火炬開發區" href="javascript:void(0);" onclick="filterByDistrict('火炬開發區')">
            <area shape="rect" coords="264,359,318,381" alt="東區" href="javascript:void(0);" onclick="filterByDistrict('東區')">
            <area shape="rect" coords="213,402,260,425" alt="南區" href="javascript:void(0);" onclick="filterByDistrict('南區')">
            <area shape="rect" coords="394,381,443,395" alt="南朗鎮" href="javascript:void(0);" onclick="filterByDistrict('南朗鎮')">
            <area shape="rect" coords="169,354,222,373" alt="沙溪鎮" href="javascript:void(0);" onclick="filterByDistrict('沙溪鎮')">
            <area shape="rect" coords="94,198,141,217" alt="小欖鎮" href="javascript:void(0);" onclick="filterByDistrict('小欖鎮')">
            <area shape="rect" coords="310,161,358,178" alt="三角鎮" href="javascript:void(0);" onclick="filterByDistrict('三角鎮')">
            <area shape="rect" coords="297,546,352,562" alt="三鄉鎮" href="javascript:void(0);" onclick="filterByDistrict('三鄉鎮')">
            <area shape="rect" coords="260,263,307,276" alt="港口鎮" href="javascript:void(0);" onclick="filterByDistrict('港口鎮')">
            <area shape="rect" coords="240,123,290,133" alt="黃圃鎮" href="javascript:void(0);" onclick="filterByDistrict('黃圃鎮')">
            <area shape="rect" coords="131,158,179,174" alt="東鳳鎮" href="javascript:void(0);" onclick="filterByDistrict('東鳳鎮')">
            <area shape="rect" coords="291,466,351,478" alt="五桂山鎮" href="javascript:void(0);" onclick="filterByDistrict('五桂山鎮')">
            <area shape="rect" coords="151,124,193,135" alt="南頭鎮" href="javascript:void(0);" onclick="filterByDistrict('南頭鎮')">
            <area shape="rect" coords="299,632,352,650" alt="坦洲鎮" href="javascript:void(0);" onclick="filterByDistrict('坦洲鎮')">
            <area shape="rect" coords="165,251,215,267" alt="東升鎮" href="javascript:void(0);" onclick="filterByDistrict('東升鎮')">
            <area shape="rect" coords="48,238,93,250" alt="古鎮鎮" href="javascript:void(0);" onclick="filterByDistrict('古鎮鎮')">
            <area shape="rect" coords="86,317,137,332" alt="橫欄鎮" href="javascript:void(0);" onclick="filterByDistrict('橫欄鎮')">
            <area shape="rect" coords="218,185,266,203" alt="阜沙鎮" href="javascript:void(0);" onclick="filterByDistrict('阜沙鎮')">
            <area shape="rect" coords="379,227,425,245" alt="民眾鎮" href="javascript:void(0);" onclick="filterByDistrict('民眾鎮')">
            <area shape="rect" coords="486,292,533,311" alt="馬鞍島" href="javascript:void(0);" onclick="filterByDistrict('馬鞍島')">
            <area shape="rect" coords="138,403,187,419" alt="大涌鎮" href="javascript:void(0);" onclick="filterByDistrict('大涌鎮')">
            <area shape="rect" coords="183,486,234,508" alt="板芙鎮" href="javascript:void(0);" onclick="filterByDistrict('板芙鎮')">
            <area shape="rect" coords="225,584,277,605" alt="神灣鎮" href="javascript:void(0);" onclick="filterByDistrict('神灣鎮')">
        </map>
    </div>

    <!-- 地區選擇按鈕 (全部攤開) -->
    <div class="bg-white shadow-sm sticky top-[60px] z-10 border-b border-gray-100">
        <div class="max-w-4xl mx-auto px-4 py-3 flex flex-wrap gap-2" id="district-filters">
            <!-- JavaScript 自動生成 -->
        </div>
    </div>

    <!-- 列表內容 -->
    <main class="max-w-4xl mx-auto p-4">
        <div id="loader" class="text-center py-10 text-gray-500 font-medium italic">正在載入中山美食數據...</div>
        <div id="restaurantGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
    </main>

    <footer class="text-center py-8 text-gray-400 text-[10px]">
        <p>© 2026 中山美食地圖 | 兼容所有手機型號</p>
    </footer>

    <!-- 引入縮放插件，解決手機點擊錯位問題 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/image-map-resizer/1.0.10/js/imageMapResizer.min.js"></script>
    <script>
        const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTtli5qEDucHqpfVOHASkAfbxHIeC7_krqoVPnrRA1b83VfdqaAnlHNPmLKkwJyLpPC1O7AHr5wFQg7/pub?output=csv';
        
        let allData = [];
        let currentDistrict = '全部';

        const ALL_DISTRICTS = [
            "石岐區", "東區", "西區", "南區", "五桂山鎮", "火炬開發區", "馬鞍島",
            "黃圃鎮", "南頭鎮", "東鳳鎮", "阜沙鎮", "小欖鎮", "東升鎮", "古鎮鎮",
            "橫欄鎮", "三角鎮", "民眾鎮", "南朗鎮", "港口鎮", "大涌鎮", "沙溪鎮",
            "三鄉鎮", "板芙鎮", "神灣鎮", "坦洲鎮"
        ];

        async function init() {
            Papa.parse(sheetUrl, {
                download: true,
                header: true,
                complete: function(results) {
                    allData = results.data.filter(item => item['Restaurant Name'] && item['Restaurant Name'].trim() !== ''); 
                    generateDistrictButtons();
                    renderData(allData);
                    document.getElementById('loader').classList.add('hidden');
                    // 啟動地圖縮放監控
                    imageMapResize(); 
                }
            });
        }

        function generateDistrictButtons() {
            const filterContainer = document.getElementById('district-filters');
            let html = `<button onclick="filterByDistrict('全部')" class="district-btn px-4 py-1 bg-orange-500 text-white rounded-full text-xs font-medium" data-district="全部">全部</button>`;
            ALL_DISTRICTS.forEach(d => {
                html += `<button onclick="filterByDistrict('${d}')" class="district-btn px-4 py-1 bg-gray-100 text-gray-600 rounded-full text-xs font-medium" data-district="${d}">${d}</button>`;
            });
            filterContainer.innerHTML = html;
        }

        window.filterByDistrict = function(district) {
            currentDistrict = district;
            document.querySelectorAll('.district-btn').forEach(btn => {
                if(btn.getAttribute('data-district') === district) {
                    btn.classList.replace('bg-gray-100', 'bg-orange-500');
                    btn.classList.replace('text-gray-600', 'text-white');
                } else {
                    btn.classList.replace('bg-orange-500', 'bg-gray-100');
                    btn.classList.replace('text-white', 'text-gray-600');
                }
            });
            applyFilters();
            if(district !== '全部') {
                document.getElementById('district-filters').scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        document.getElementById('searchInput').addEventListener('input', applyFilters);

        function applyFilters() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allData.filter(item => {
                const matchD = currentDistrict === '全部' || item['District'] === currentDistrict;
                const matchS = item['Restaurant Name'].toLowerCase().includes(term) || 
                               (item['Highlight'] && item['Highlight'].toLowerCase().includes(term));
                return matchD && matchS;
            });
            renderData(filtered);
        }

        function renderData(data) {
            const container = document.getElementById('restaurantGrid');
            if (data.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center text-gray-400 py-10 text-sm">此地區暫未有餐廳資料</div>`;
                return;
            }
            container.innerHTML = data.map(item => `
                <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                    <div class="flex justify-between items-start">
                        <h2 class="text-base font-bold text-gray-800">${item['Restaurant Name']}</h2>
                        <span class="bg-orange-50 text-orange-600 text-[10px] px-2 py-0.5 rounded font-bold">${item['District']}</span>
                    </div>
                    <div class="mt-2 flex gap-1">
                        <span class="bg-gray-100 text-gray-500 text-[10px] px-1.5 py-0.5 rounded">${item['Category'] || '美食'}</span>
                        <span class="bg-blue-50 text-blue-600 text-[10px] px-1.5 py-0.5 rounded">人均: ${item['Avg Cost'] || '--'}</span>
                    </div>
                    <p class="text-gray-600 text-xs mt-3 leading-relaxed">● ${item['Highlight'] || '暫無描述'}</p>
                </div>
            `).join('');
        }

        init();
    </script>
</body>
</html>
