        <area shape="rect" coords="36,232,97,262" alt="古鎮鎮" onclick="setDistrict('古鎮鎮')">
        <area shape="rect" coords="352,217,443,254" alt="民眾鎮" onclick="setDistrict('民眾鎮')">
        <area shape="rect" coords="237,314,303,338" alt="石岐區" onclick="setDistrict('石岐區')">
        <area shape="rect" coords="202,289,249,312" alt="西區" onclick="setDistrict('西區')">
        <area shape="rect" coords="155,350,231,383" alt="沙溪鎮" onclick="setDistrict('沙溪鎮')">
        <area shape="rect" coords="277,617,364,662" alt="坦洲鎮" onclick="setDistrict('坦洲鎮')">
        <area shape="rect" coords="151,242,223,276" alt="東升鎮" onclick="setDistrict('東升鎮')">
        <area shape="rect" coords="257,356,323,386" alt="東區" onclick="setDistrict('東區')">
        <area shape="rect" coords="122,151,185,178" alt="東鳳鎮" onclick="setDistrict('東鳳鎮')">
        <area shape="rect" coords="162,479,249,519" alt="板芙鎮" onclick="setDistrict('板芙鎮')">
        <area shape="rect" coords="204,176,273,207" alt="阜沙鎮" onclick="setDistrict('阜沙鎮')">
        <area shape="rect" coords="376,369,474,420" alt="南朗鎮" onclick="setDistrict('南朗鎮')">
        <area shape="rect" coords="204,395,262,435" alt="南區" onclick="setDistrict('南區')">
        <area shape="rect" coords="140,114,206,144" alt="南頭鎮" onclick="setDistrict('南頭鎮')">
        <area shape="rect" coords="216,577,285,609" alt="神灣鎮" onclick="setDistrict('神灣鎮')">
        <area shape="rect" coords="477,283,540,320" alt="馬鞍島" onclick="setDistrict('馬鞍島')">
        <area shape="rect" coords="245,248,322,284" alt="港口鎮" onclick="setDistrict('港口鎮')">
        <area shape="rect" coords="72,304,153,343" alt="橫欄鎮" onclick="setDistrict('橫欄鎮')">
        <area shape="rect" coords="291,150,367,193" alt="三角鎮" onclick="setDistrict('三角鎮')">
    </map>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/image-map-resizer/1.0.10/js/imageMapResizer.min.js"></script>
    <script>
        const apiUrl = 'https://script.google.com/macros/s/AKfycbz3ndkfrGdmioPbbBoM1qgw11G7eDs1Wvv9fR0zwPYadkc0pbJuv90KmQ9CnoleSgub3A/exec';
        let allData = [], currentRenderedData = [], activeDetailItem = null;
        let filtersState = { district: '全部', category: '全部', price: '全部', myTag: '全部' };
        let userRecords = JSON.parse(localStorage.getItem('zsFoodMap_v1') || '{}');
        const CATEGORY_ICONS = { "粵菜": "🍚", "日式料理": "🍣", "海鮮酒樓": "🦞", "海鮮粥": "🍜", "粥麵小食": "🍜", "咖啡 Chill 地方": "☕", "農家菜": "🌿", "西式": "🍝", "順德菜": "🥘", "火鍋": "🍲" };
        const districtColors = { "東區": "#ef4444", "坦洲鎮": "#7a8f9a", "石岐區": "#f59e0b", "西區": "#3b82f6", "南區": "#10b981", "小欖鎮": "#8b5cf6", "全部": "#f97316" };

        window.showToast = function(msg, dur = 3000) { 
            const t = document.getElementById("customToast"); 
            if(t) { t.innerHTML = msg + `<div class='mt-4 text-center'><button onclick="this.parentElement.parentElement.className=''" class='bg-white/20 px-6 py-2 rounded-full text-xs font-bold'>關閉</button></div>`; t.className = "show"; if(dur > 0) setTimeout(() => t.className = "", dur); } 
        };

        window.openInfoModal = function(type) {
            const contents = {
                about: { title: "關於我們", body: "<p>「中山美食地圖」提供全面的中山飲食資訊，方便大家發掘城中美味。</p>" },
                privacy: { title: "隱私權政策", body: "<p>本網站使用 GA4 收集匿名數據。個人紀錄僅儲存於您的設備本地端。</p>" },
                terms: { title: "服務條款", body: "<p>餐廳資訊僅供參考，實際以官方公佈為準。</p>" },
                contact: { title: "聯絡我們", body: "<p>如您發現餐廳資訊有誤、有私藏好店推介，或希望提供支持，歡迎隨時聯絡我們：</p><p class='font-bold mt-4'>Facebook 群組：<a href='https://www.facebook.com/groups/998954119219884' target='_blank' class='text-blue-500'>中山美食地圖群組</a></p>" }
            };
            const c = contents[type];
            if (!c) return;
            document.getElementById('infoModalTitle').innerText = c.title;
            document.getElementById('infoModalBody').innerHTML = c.body;
            document.getElementById('infoModalOverlay').style.display = 'flex';
        };

        window.closeInfoModal = function() { document.getElementById('infoModalOverlay').style.display = 'none'; };

        window.handleLiveSearch = function() { applyFilters(); };
        window.triggerSearch = function() { closeDetail(); applyFilters(); document.activeElement.blur(); jumpToResults(); };
        window.jumpToResults = function() { document.getElementById('filterMenu').classList.add('hidden'); const t = document.getElementById('resultsAnchor'); window.scrollTo({ top: t.offsetTop - 100, behavior: 'smooth' }); };
        window.setFilterState = function(t, v) { filtersState[t] = v; updatePillUI(); applyFilters(); };
        window.setDistrict = function(d) { closeDetail(); filtersState.district = d; updatePillUI(); applyFilters(); jumpToResults(); };
        window.resetToHome = function() { closeDetail(); resetAllFilters(true); window.scrollTo({ top: 0, behavior: 'smooth' }); refreshMap(); };
        window.resetAllFilters = function(full) { 
            filtersState = { district: '全部', category: '全部', price: '全部', myTag: '全部' }; 
            document.getElementById('searchInput').value = ''; updatePillUI(); applyFilters(); 
            if(full) { document.getElementById('filterMenu').classList.add('hidden'); document.getElementById('inlineFilterSection').classList.add('hidden'); }
        };

        window.toggleFilters = function() { document.getElementById('filterMenu').classList.toggle('hidden'); };
        window.toggleInlineFilters = function() { document.getElementById('inlineFilterSection').classList.toggle('hidden'); };
        window.showUserGuide = function() { window.showToast(`<div class='space-y-2'><p class='font-bold text-white text-xl mb-4'>用戶操作手冊</p><details class='guide-details' open><summary>📲 加入桌面</summary><div class='guide-content'>iOS: 分享 -> 加入主畫面<br>Android: 三點 -> 加入主螢幕</div></details></div>`, 0); };
        window.showBookmarkGuide = function() { window.showToast("點擊餐廳詳情內的「收藏」或「想去」即可標記。"); };

        function getUserData(n) { return userRecords[n] || { visited: false, favorite: false, want: false, rating: 0, note: '' }; }
        function saveUserData(n, d) { userRecords[n] = d; localStorage.setItem('zsFoodMap_v1', JSON.stringify(userRecords)); }
        function refreshMap() { setTimeout(() => { if(window.imageMapResize) imageMapResize(); }, 400); }
        function isMobileDevice() { return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent); }

        window.handleXhsClick = function(name, district) {
            if (isMobileDevice()) { window.showToast("⚠️ 手機版不能用小紅書搜索，請用電腦版。", 5000); } 
            else { window.open(`https://www.xiaohongshu.com/search_result/?keyword=${encodeURIComponent(name + " " + district)}`, '_blank'); }
        };

        async function init() {
            try {
                const response = await fetch(apiUrl);
                const results = await response.json();
                allData = results.map((row, index) => { 
                    const getVal = (key) => {
                        const foundKey = Object.keys(row).find(k => k.trim().toLowerCase() === key.toLowerCase());
                        return foundKey ? (row[foundKey] || "").toString().trim() : "";
                    };
                    return { 'Restaurant_Name': getVal('Restaurant_Name'), 'District': getVal('District'), 'Category': getVal('Category'), 'Avg_Cost': getVal('Avg_Cost'), 'Highlight': getVal('Highlight'), 'Address': getVal('Address'), 'Amap_URL': getVal('Amap_URL'), 'Status': getVal('status'), 'Youtube': getVal('Youtube'), 'Date': getVal('Date') || getVal('日期') || '', '_index': index };
                }).filter(i => i.Restaurant_Name !== "" && i.Status.toUpperCase() !== "X");
                const now = new Date();
                document.getElementById('updateTime').innerText = `最後更新：${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日`;
                buildFilterPills(allData); applyFilters();
                document.getElementById('loader').classList.add('hidden');
                refreshMap();
            } catch (error) { document.getElementById('loader').innerHTML = '<div class="text-gray-400">載入失敗。</div>'; }
        }

        function applyFilters() {
            const term = document.getElementById('searchInput').value.toLowerCase().trim();
            currentRenderedData = allData.filter(item => {
                const userData = getUserData(item.Restaurant_Name);
                const matchD = filtersState.district === '全部' || item.District === filtersState.district;
                const matchC = filtersState.category === '全部' || item.Category === filtersState.category;
                const matchS = item.Restaurant_Name.toLowerCase().includes(term) || (item.Highlight && item.Highlight.toLowerCase().includes(term));
                const matchTag = filtersState.myTag === '全部' || userData[filtersState.myTag] === true;
                return matchD && matchC && matchS && matchTag;
            }).sort((a, b) => {
                const aHasYt = a.Youtube && a.Youtube.startsWith('http') ? 1 : 0;
                const bHasYt = b.Youtube && b.Youtube.startsWith('http') ? 1 : 0;
                if (aHasYt !== bHasYt) return bHasYt - aHasYt;
                return b._index - a._index;
            });
            renderData(currentRenderedData);
        }

        function renderData(data) {
            const container = document.getElementById('restaurantGrid'), header = document.getElementById('districtHeader');
            header.style.backgroundColor = districtColors[filtersState.district] || "#f97316";
            header.classList.remove('hidden');
            document.getElementById('districtTitle').innerText = filtersState.district === '全部' ? (document.getElementById('searchInput').value ? '搜尋結果' : '所有地區') : filtersState.district;
            document.getElementById('districtCount').innerText = `共 ${data.length} 間`;
            if (data.length === 0) { container.innerHTML = `<div class="col-span-full p-20 text-center text-gray-400 bg-white">🍽️ 找不到結果。</div>`; return; }
            
            container.innerHTML = data.map((item, index) => {
                const userData = getUserData(item.Restaurant_Name);
                const hasYoutube = item.Youtube && item.Youtube.startsWith('http');
                
                return `<div class="bg-white p-4 relative border-b border-gray-100">
                    <div class="flex gap-4 cursor-pointer mb-3" onclick="openDetail(${index})">
                        <div class="w-16 h-16 rounded-2xl bg-gray-50 flex items-center justify-center flex-shrink-0 text-3xl border border-gray-100">${CATEGORY_ICONS[item.Category] || '🍽️'}</div>
                        <div class="flex-1 min-w-0 pr-6">
                            <div class="flex justify-between items-start">
                                <div class="flex items-center gap-1.5 truncate">
                                    <h3 class="text-[16px] font-bold text-gray-800 truncate">${item.Restaurant_Name}</h3>
                                    ${hasYoutube ? `<i class="fa-brands fa-youtube text-red-600 text-lg"></i>` : ''}
                                </div>
                                
                                <div class="flex items-center gap-3 shrink-0 ml-2">
                                    ${(item.Status && item.Status.startsWith('http')) ? `<a href="${item.Status}" target="_blank" onclick="event.stopPropagation()" class="relative flex items-center justify-center w-9 h-9 shrink-0 bg-white text-red-600 rounded-full border-2 border-red-600 shadow-sm active:scale-90 transition-transform" title="點擊查看有伏詳情">
                                        <span class="absolute -top-4 text-[14px] animate-bounce drop-shadow-sm pointer-events-none">👇</span>
                                        <span class="text-[11px] font-black leading-none mt-0.5">有伏</span>
                                    </a>` : ''}
                                    <i class="fa-solid fa-heart ${userData.favorite ? 'text-orange-400' : 'text-gray-200'} text-lg"></i>
                                </div>
                            </div>
                            <p class="text-[11px] text-gray-400 line-clamp-1 mt-0.5 leading-tight">${item.Highlight || '查看詳情'}</p>
                            <div class="flex justify-between items-center mt-2">
                                <div class="flex items-center gap-1.5">
                                    <span class="bg-gray-100 text-gray-600 px-2 py-0.5 rounded text-[10px] font-bold">${item.District}</span>
                                    <span class="bg-gray-100 text-gray-500 px-2.5 py-0.5 rounded-full text-[10px] font-medium">${item.Category}</span>
                                </div>
                                <span class="text-[11px] text-gray-400">人均 ¥${item.Avg_Cost || '--'}</span>
                            </div>
                        </div>
                    </div>
                    <div class="grid grid-cols-4 gap-2 border-t border-gray-50 pt-3">
                        <a href="${item.Amap_URL || '#'}" target="_blank" onclick="event.stopPropagation()" class="flex items-center justify-center gap-1 py-1.5 rounded-lg border border-blue-100 bg-blue-50/30 text-blue-500 text-[10px] font-bold active:scale-95 transition">導航</a>
                        <button onclick="event.stopPropagation(); handleXhsClick('${item.Restaurant_Name.replace(/'/g, "\\'")}', '${item.District}')" class="flex items-center justify-center gap-1 py-1.5 rounded-lg border border-red-100 bg-red-50/30 text-red-500 text-[10px] font-bold active:scale-95 transition">小紅書</button>
                        <a href="https://www.douyin.com/search/${encodeURIComponent(item.Restaurant_Name + " " + item.District)}" target="_blank" onclick="event.stopPropagation()" class="flex items-center justify-center gap-1 py-1.5 rounded-lg border border-gray-200 bg-gray-50 text-gray-800 text-[10px] font-bold active:scale-95 transition">抖音</a>
                        <button onclick="event.stopPropagation(); window.shareRestaurant(${index})" class="flex items-center justify-center gap-1 py-1.5 rounded-lg border border-green-100 bg-green-50/30 text-green-500 text-[10px] font-bold active:scale-95 transition">分享</button>
                    </div>
                </div>`;
            }).join('');
        }

        window.openDetail = function(idx) {
            const item = currentRenderedData[idx]; if(!item) return;
            activeDetailItem = item; const data = getUserData(item.Restaurant_Name);
            
            document.getElementById('detailName').innerText = item.Restaurant_Name;
            document.getElementById('detailDistrictBadge').innerText = item.District;
            
            // 🌟 核心更新：同步放大詳情頁內嘅白底紅字紅邊框「有伏」Link
            const statusLink = document.getElementById('detailStatusLink');
            if (item.Status && item.Status.startsWith('http')) {
                statusLink.href = item.Status;
                statusLink.classList.remove('hidden');
                statusLink.classList.add('inline-flex');
            } else {
                statusLink.href = "#"; // 重置 Link 防呆
                statusLink.classList.add('hidden');
                statusLink.classList.remove('inline-flex');
            }

            document.getElementById('detailCategory').innerHTML = `<i class="fa-solid fa-utensils mr-1"></i>${item.Category || '美食'}`;
            document.getElementById('detailPrice').innerHTML = `<i class="fa-solid fa-sack-dollar text-[#d4b068] mr-1"></i>人均 ¥${item.Avg_Cost || '--'}`;
            document.getElementById('detailHighlight').innerText = item.Highlight || '暫無詳細描述';
            document.getElementById('detailAddress').innerText = item.Address || `中山市${item.District}`;
            document.getElementById('noteInput').value = data.note || '';
            updateDetailUI(data);
            
            const ytSection = document.getElementById('youtubeSection'), ytBtn = document.getElementById('btnYoutubeDetail');
            if(item.Youtube && item.Youtube.startsWith('http')) { ytSection.classList.remove('hidden'); ytBtn.href = item.Youtube; } else { ytSection.classList.add('hidden'); }
            
            document.getElementById('btnNav').href = item.Amap_URL || '#';
            document.getElementById('btnDy').href = `https://www.douyin.com/search/${encodeURIComponent(item.Restaurant_Name + " " + item.District)}`;
            document.getElementById('mainContentView').classList.add('hidden');
            document.getElementById('detailView').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'auto' });
        };
        window.closeDetail = function() { document.getElementById('detailView').classList.add('hidden'); document.getElementById('mainContentView').classList.remove('hidden'); refreshMap(); };

        function updateDetailUI(data) {
            const setBtn = (id, active, activeClass) => { const btn = document.getElementById(id); if(btn) btn.className = `px-2.5 py-1.5 rounded-lg text-[10px] font-bold shadow-sm border ${active ? activeClass : 'bg-white border-gray-200 text-gray-500'}`; };
            setBtn('btnVisited', data.visited, 'bg-gray-500 border-gray-500 text-white');
            setBtn('btnFav', data.favorite, 'bg-white border-orange-200 text-orange-500');
            setBtn('btnWant', data.want, 'bg-white border-red-200 text-red-500');
            const stars = document.querySelectorAll('#starRating i');
            stars.forEach((s, i) => { if(i < data.rating) s.classList.add('star-active'); else s.classList.remove('star-active'); });
        }
        
        window.toggleUserStatus = function(type) { if(!activeDetailItem) return; const name = activeDetailItem.Restaurant_Name; let data = getUserData(name); data[type] = !data[type]; saveUserData(name, data); updateDetailUI(data); applyFilters(); };
        window.saveRating = function(val) { if(!activeDetailItem) return; const name = activeDetailItem.Restaurant_Name; let data = getUserData(name); data.rating = val; saveUserData(name, data); updateDetailUI(data); };
        window.saveNote = function() { if(!activeDetailItem) return; const name = activeDetailItem.Restaurant_Name; let data = getUserData(name); data.note = document.getElementById('noteInput').value; saveUserData(name, data); };
        window.copyAddress = function() { const addr = document.getElementById('detailAddress').innerText; navigator.clipboard.writeText(addr).then(() => { window.showToast('✅ 地址已複製'); }); };
        
        function buildFilterPills(data) {
            const valid = data; 
            const dG = document.getElementById('filterGridDistrict'), cG = document.getElementById('filterGridCategory'), pG = document.getElementById('filterGridPrice');
            
            dG.innerHTML = createPill('district', '全部', '全部') + [...new Set(valid.map(i=>i.District))].map(d => createPill('district', d, d)).join('');
            cG.innerHTML = createPill('category', '全部', '🍽️ 全部') + [...new Set(valid.map(i=>i.Category))].map(c => createPill('category', c, `${CATEGORY_ICONS[c?.trim()] || '🍽️'} ${c}`)).join('');
            pG.innerHTML = createPill('price', '全部', '全部') + ['0-50', '51-100', '101-'].map((v, i) => createPill('price', v, ['¥50以下', '¥50-100', '¥100以上'][i])).join('');
            
            const inlineCat = document.getElementById('inlineCategoryFilter');
            inlineCat.innerHTML = `<option value="全部">🍽️ 全部類別</option>` + [...new Set(valid.map(i=>i.Category))].map(c => `<option value="${c}">${CATEGORY_ICONS[c?.trim()] || '🍽️'} ${c}</option>`).join('');
            updatePillUI();
        }
        
        function createPill(t, v, l) { return `<button onclick="setFilterState('${t}', '${v}')" data-type="${t}" data-value="${v}" class="filter-pill px-3 py-1.5 rounded-full text-[11px] border border-gray-200 bg-white shadow-sm mb-1 mr-1">${l}</button>`; }
        
        function updatePillUI() { 
            document.querySelectorAll('.filter-pill').forEach(p => { const t = p.getAttribute('data-type'), v = p.getAttribute('data-value'); if (filtersState[t] === v) p.className = "filter-pill px-3 py-1.5 rounded-full text-[11px] font-bold border border-[#f97316] text-white bg-[#f97316] shadow-sm mb-1 mr-1"; else p.className = "filter-pill px-3 py-1.5 rounded-full text-[11px] border border-gray-200 text-gray-600 bg-white shadow-sm mb-1 mr-1"; }); 
            document.getElementById('inlineCategoryFilter').value = filtersState.category; document.getElementById('inlinePriceFilter').value = filtersState.price;
        }

        window.shareRestaurant = function(idx) { const item = currentRenderedData[idx]; const url = `${window.location.origin}${window.location.pathname}?r=${encodeURIComponent(item.Restaurant_Name)}`; navigator.clipboard.writeText(url).then(() => { window.showToast('✅ 連結已複製'); }); };
        window.shareDetail = function() { if(!activeDetailItem) return; const url = `${window.location.origin}${window.location.pathname}?r=${encodeURIComponent(activeDetailItem.Restaurant_Name)}`; navigator.clipboard.writeText(url).then(() => { window.showToast('✅ 連結已複製'); }); };
        
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
