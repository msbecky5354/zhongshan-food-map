        img[usemap] { max-width: 100%; height: auto; }

    <script src="https://cdnjs.cloudflare.com/ajax/libs/image-map-resizer/1.0.10/js/imageMapResizer.min.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(err => console.log('SW Error:', err));
            });
        }

        const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTtli5qEDucHqpfVOHASkAfbxHIeC7_krqoVPnrRA1b83VfdqaAnlHNPmLKkwJyLpPC1O7AHr5wFQg7/pub?output=csv';
        
        let allData = [];
        let currentRenderedData = [];
        let activeDetailItem = null; 

        let filtersState = {
            district: '全部',
            category: '全部',
            price: '全部'
        };

        const ALL_DISTRICTS = [
            "石岐區", "東區", "西區", "南區", "五桂山鎮", "火炬開發區", "馬鞍島",
            "黃圃鎮", "南頭鎮", "東鳳鎮", "阜沙鎮", "小欖鎮", "東升鎮", "古鎮鎮",
            "橫欄鎮", "三角鎮", "民眾鎮", "南朗鎮", "港口鎮", "大涌鎮", "沙溪鎮",
            "三鄉鎮", "板芙鎮", "神灣鎮", "坦洲鎮"
        ];

        const PRICE_RANGES = [
            { label: '全部', value: '全部' },
            { label: '¥50以下', value: '0-50' },
            { label: '¥50-100', value: '51-100' },
            { label: '¥100以上', value: '101-' }
        ];

        // 智能菜式 Emoji 對應表
        const CATEGORY_ICONS = {
            "粵菜": "🍚", "日式料理": "🍣", "海鮮酒樓": "🦞", "粥麵小食": "🍜", 
            "咖啡 Chill 地方": "☕", "農家菜": "🌿", "西式": "🍝", "私房菜": "🍽️", 
            "家常菜": "🥦", "燒烤": "🍢", "甜品": "🍮", "煲仔飯": "🍱", "素食": "🥦",
            "順德菜": "🥘", "火鍋": "🍲", "客家菜": "🍽️", "泰式料理": "🥘", "滷水": "🍗",
            "炸物小食": "🍟", "星馬菜": "🍛", "法式甜品": "🥐", "沙溪菜": "🍲", 
            "粵菜酒樓": "🍚", "潮汕菜": "🍲", "粥麵火鍋": "🍜", "粉麵米線": "🍜", 
            "海鮮粥": "🍲", "雲貴川菜": "🌶️", "中華料理": "🥢", "融合菜 Fusion": "🍽️", 
            "湘菜": "🌶️", "麵食": "🍜", "韓國菜": "🥘", "茶餐廳": "☕", "大牌檔": "🍞"
        };

        const districtColors = {
            "黃圃鎮": "#d87a41", "南頭鎮": "#85a953", "東鳳鎮": "#b1c953", "小欖鎮": "#5f87d4",
            "古鎮鎮": "#c85665", "橫欄鎮": "#6fded5", "東升鎮": "#a4a0e1", "阜沙鎮": "#dcb858",
            "三角鎮": "#60dbe4", "民眾鎮": "#9ffb8e", "港口鎮": "#e7a88f", "西區": "#a1f44c",
            "石岐區": "#f7e53f", "東區": "#a5409d", "火炬開發區": "#ab77f7", "馬鞍島": "#a4c7cd",
            "南朗鎮": "#8db7b3", "沙溪鎮": "#e7878d", "大涌鎮": "#df5642", "南區": "#cdcf47",
            "五桂山鎮": "#e98e4f", "板芙鎮": "#ae77f3", "三鄉鎮": "#8f9e51", "神灣鎮": "#a2d861",
            "坦洲鎮": "#ef6fc3", "全部": "linear-gradient(to right, #f97316, #fb923c)"
        };

        // 獲取 Emoji (搵唔到就用 🍽️)
        function getIcon(categoryName) {
            if (!categoryName) return "🍽️";
            return CATEGORY_ICONS[categoryName.trim()] || "🍽️";
        }

        async function init() {
            Papa.parse(sheetUrl, {
                download: true,
                header: true,
                complete: function(results) {
                    allData = results.data.filter(item => item['Restaurant Name'] && item['Restaurant Name'].trim() !== ''); 
                    
                    const now = new Date();
                    const timeStr = `${now.getFullYear()}年${String(now.getMonth() + 1).padStart(2, '0')}月${String(now.getDate()).padStart(2, '0')}日 ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
                    document.getElementById('updateTime').innerText = `最後同步：${timeStr}`;

                    buildFilterPills(allData);
                    
                    const urlParams = new URLSearchParams(window.location.search);
                    const targetRest = urlParams.get('r');
                    
                    if (targetRest) {
                        document.getElementById('searchInput').value = targetRest;
                        applyFilters();
                        setTimeout(() => {
                            if (currentRenderedData.length === 1) {
                                openDetail(0);
                            } else {
                                window.scrollTo({ top: document.getElementById('districtHeader').offsetTop - 140, behavior: 'auto' });
                            }
                        }, 500);
                    } else {
                        renderData(allData);
                    }

                    document.getElementById('loader').classList.add('hidden');
                    imageMapResize(); 
                }
            });
        }

        function buildFilterPills(data) {
            const distGrid = document.getElementById('filterGridDistrict');
            let distHtml = createPill('district', '全部', '全部');
            ALL_DISTRICTS.forEach(d => distHtml += createPill('district', d, d));
            distGrid.innerHTML = distHtml;

            // 菜式標籤加入 Emoji
            const catGrid = document.getElementById('filterGridCategory');
            const categories = [...new Set(data.map(item => item['Category']?.trim()))].filter(Boolean).sort();
            let catHtml = createPill('category', '全部', '🍽️ 全部');
            categories.forEach(c => {
                const icon = getIcon(c);
                catHtml += createPill('category', c, `${icon} ${c}`);
            });
            catGrid.innerHTML = catHtml;

            const priceGrid = document.getElementById('filterGridPrice');
            let priceHtml = '';
            PRICE_RANGES.forEach(p => priceHtml += createPill('price', p.value, p.label));
            priceGrid.innerHTML = priceHtml;

            updatePillUI();
        }

        function createPill(type, value, label) {
            return `<button onclick="setFilterState('${type}', '${value}')" 
                    data-type="${type}" data-value="${value}" 
                    class="filter-pill px-3 py-1.5 rounded-full text-[11px] font-medium border border-gray-200 text-gray-600 bg-white shadow-sm active:scale-95">
                    ${label}
                    </button>`;
        }

        window.setFilterState = function(type, value) {
            filtersState[type] = value;
            updatePillUI();
            applyFilters();
        }

        function updatePillUI() {
            document.querySelectorAll('.filter-pill').forEach(pill => {
                const type = pill.getAttribute('data-type');
                const val = pill.getAttribute('data-value');
                
                if (filtersState[type] === val) {
                    pill.className = "filter-pill px-3 py-1.5 rounded-full text-[11px] font-bold border border-[#f97316] text-white bg-[#f97316] shadow-sm active:scale-95";
                } else {
                    pill.className = "filter-pill px-3 py-1.5 rounded-full text-[11px] font-medium border border-gray-200 text-gray-600 bg-white shadow-sm active:scale-95 hover:bg-gray-50";
                }
            });
        }

        function toggleFilters() {
            document.getElementById('filterMenu').classList.toggle('hidden');
        }

        window.resetToHome = function() {
            closeDetail(); 
            window.location.href = window.location.origin + window.location.pathname; 
        }

        window.setDistrict = function(d) {
            closeDetail();
            setFilterState('district', d); 
            setTimeout(() => {
                window.scrollTo({ top: document.getElementById('districtHeader').offsetTop - 140, behavior: 'auto' });
            }, 10);
        }

        window.openDetail = function(index) {
            const item = currentRenderedData[index];
            activeDetailItem = item; 
            const catIcon = getIcon(item['Category']);

            document.getElementById('detailBackText').innerText = filtersState.district === '全部' ? '返回列表' : filtersState.district;
            document.getElementById('detailName').innerText = item['Restaurant Name'];
            // 內頁菜式也同步顯示 Emoji
            document.getElementById('detailCategory').innerHTML = `<span class="mr-1">${catIcon}</span>${item['Category'] || '特色美食'}`;
            document.getElementById('detailPrice').innerHTML = `<i class="fa-solid fa-sack-dollar mr-1"></i>人均 ${item['Avg Cost'] || '--'}`;
            document.getElementById('detailHighlight').innerText = item['Highlight'] || '暫無詳細描述，快啲去親自試下啦！';
            
            const addressText = item['Address'] && item['Address'].trim() !== '' ? item['Address'] : `中山市${item['District']} (點擊導航前往)`;
            document.getElementById('detailAddress').innerText = addressText;

            const query = encodeURIComponent(item['Restaurant Name']);
            document.getElementById('btnNav').href = item['Amap URL'] || '#';
            document.getElementById('btnNav').style.opacity = item['Amap URL'] ? '1' : '0.5'; 
            
            document.getElementById('btnXhs').href = `https://www.xiaohongshu.com/search_result/?keyword=${query}`;
            document.getElementById('btnDy').href = `https://www.douyin.com/search/${query}`;

            document.getElementById('mainContentView').classList.add('hidden');
            document.getElementById('detailView').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'auto' });
        }

        window.closeDetail = function() {
            document.getElementById('detailView').classList.add('hidden');
            document.getElementById('mainContentView').classList.remove('hidden');
            activeDetailItem = null;
            window.scrollTo({ top: document.getElementById('districtHeader').offsetTop - 140, behavior: 'auto' });
        }

        window.copyAddress = function() {
            const address = document.getElementById('detailAddress').innerText;
            if (navigator.clipboard) {
                navigator.clipboard.writeText(address).then(() => {
                    alert(`✅ 已複製地址：\n${address}`);
                });
            }
        }

        window.shareDetail = function() {
            if(!activeDetailItem) return;
            const name = activeDetailItem['Restaurant Name'];
            const district = activeDetailItem['District'];
            const highlight = activeDetailItem['Highlight'] || '正宗中山味道';
            
            const shareUrl = `${window.location.origin}${window.location.pathname}?r=${encodeURIComponent(name)}`;
            const shareText = `🍽️ 我喺中山發現咗間正嘢：${name} (${district})\n✨ 特色：${highlight}\n\n點擊連結睇詳細地址同食評：`;

            if (navigator.share) {
                navigator.share({ title: name, text: shareText, url: shareUrl }).catch(console.error);
            } else {
                navigator.clipboard.writeText(`${shareText}\n${shareUrl}`).then(() => {
                    alert(`✅ 已複製「${name}」嘅專屬連結！\n你可以去分享畀朋友。`);
                });
            }
        }

        function applyFilters() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const cat = filtersState.category;
            const price = filtersState.price;
            const currentDist = filtersState.district;

            const filtered = allData.filter(item => {
                const matchD = currentDist === '全部' || item['District'] === currentDist;
                const matchC = cat === '全部' || item['Category'] === cat;
                const matchS = item['Restaurant Name'].toLowerCase().includes(term) || (item['Highlight'] && item['Highlight'].toLowerCase().includes(term));
                
                let matchP = true;
                if (price !== '全部') {
                    const pVal = parseInt(item['Avg Cost']?.match(/\d+/)?.[0] || 0);
                    if (price === '0-50') matchP = pVal <= 50;
                    else if (price === '51-100') matchP = pVal > 50 && pVal <= 100;
                    else if (price === '101-200') matchP = pVal > 100 && pVal <= 200;
                    else if (price === '201-') matchP = pVal > 200;
                }
                return matchD && matchC && matchS && matchP;
            });
            renderData(filtered);
        }

        function renderData(data) {
            currentRenderedData = data;
            const container = document.getElementById('restaurantGrid');
            const header = document.getElementById('districtHeader');
            const currentDist = filtersState.district;
            
            header.classList.remove('hidden');
            document.getElementById('districtTitle').innerText = currentDist === '全部' ? '搜尋結果' : currentDist;
            document.getElementById('districtCount').innerText = `共 ${data.length} 間`;
            
            const targetColor = districtColors[currentDist] || districtColors['全部'];
            header.style.background = targetColor;

            if (data.length === 0) {
                container.innerHTML = `<div class="p-10 text-center text-gray-400 bg-white">搵唔到餐廳，試下改下搜尋字眼？</div>`;
                return;
            }
            
            container.innerHTML = data.map((item, index) => {
                const query = encodeURIComponent(item['Restaurant Name']);
                const cardColor = districtColors[item['District']] || '#f97316';
                
                // 左邊大圓形使用專屬菜式 Icon，如果無就隨機畀食物圖
                const catIcon = getIcon(item['Category']);

                return `
                <div class="p-4 bg-white hover:bg-gray-50 transition-colors">
                    <div class="flex items-start gap-3">
                        <div class="w-12 h-12 rounded-full bg-gray-100 flex items-center justify-center flex-shrink-0 text-xl shadow-inner">${catIcon}</div>
                        <div class="flex-1 min-w-0">
                            <div class="cursor-pointer active:opacity-60 transition" onclick="openDetail(${index})">
                                <div class="flex justify-between items-start">
                                    <h3 class="text-[15px] font-bold text-gray-800 truncate pr-2">${item['Restaurant Name']}</h3>
                                    <button class="text-gray-300 hover:text-red-400 active:scale-95 transition" onclick="event.stopPropagation()"><i class="fa-solid fa-angle-right"></i></button>
                                </div>
                                <p class="text-[11px] text-gray-500 mt-1 line-clamp-1">${item['Highlight'] || '點擊查看詳情...'}</p>
                                <div class="flex justify-between items-center mt-2 mb-1">
                                    <span style="color: ${cardColor}; border-color: ${cardColor}; background-color: ${cardColor}15;" class="border px-2 py-0.5 rounded-full text-[9px] font-bold">${item['Category'] || '美食'}</span>
                                    <span class="text-[10px] text-gray-400 font-medium">人均 ${item['Avg Cost'] || '--'}</span>
                                </div>
                            </div>

                            <div class="grid grid-cols-4 gap-1.5 mt-3">
                                <a href="${item['Amap URL'] || '#'}" target="_blank" class="flex items-center justify-center gap-1 py-1.5 rounded-lg bg-blue-50 text-blue-500 text-[9px] font-bold"><i class="fa-solid fa-location-arrow"></i> 導航</a>
                                <a href="https://www.xiaohongshu.com/search_result/?keyword=${query}" target="_blank" class="flex items-center justify-center gap-1 py-1.5 rounded-lg bg-red-50 text-red-500 text-[9px] font-bold"><i class="fa-solid fa-book-open"></i> 小紅書</a>
                                <a href="https://www.douyin.com/search/${query}" target="_blank" class="flex items-center justify-center gap-1 py-1.5 rounded-lg bg-gray-100 text-gray-800 text-[9px] font-bold"><i class="fa-brands fa-tiktok"></i> 抖音</a>
                                <button onclick="openDetail(${index})" class="flex items-center justify-center gap-1 py-1.5 rounded-lg bg-orange-50 text-orange-500 text-[9px] font-bold"><i class="fa-solid fa-circle-info"></i> 詳情</button>
                            </div>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        document.getElementById('searchInput').addEventListener('input', applyFilters);
        init();
    </script>
</body>
</html>
