<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中山美食地圖</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* 確保地圖圖片可以隨螢幕縮放 */
        img[usemap] {
            max-width: 100%;
            height: auto;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <!-- 頂部 Header -->
    <header class="bg-orange-500 text-white p-4 shadow-md sticky top-0 z-20">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold">中山美食地圖</h1>
            <input type="text" id="searchInput" placeholder="搜尋餐廳、分類或特色..." 
                   class="px-3 py-1 rounded-full text-gray-800 focus:outline-none w-2/5 text-sm">
        </div>
    </header>

    <!-- 視覺地圖區 (使用 Image Map) -->
    <div class="bg-white max-w-4xl mx-auto border-b border-gray-200 text-center relative">
        <!-- 呢度會顯示你上載嘅 image.png，並且套用 image-map -->
        <img src="image.png" alt="中山分區地圖" usemap="#zhongshanMap" id="visualMap" class="mx-auto" onerror="this.style.display='none'">
        
        <p class="text-xs text-gray-400 py-2">點擊地圖區域或下方按鈕進行篩選</p>

        <!-- Image Map 點擊區域定義 -->
        <!-- 注意：呢啲坐標 (coords) 係根據你之前張圖大概估算嘅，可能需要微調 -->
        <map name="zhongshanMap" id="zhongshanMap">
            <!-- 北部 -->
            <area shape="rect" coords="220,100,320,150" alt="黃圃鎮" title="黃圃鎮" href="javascript:void(0);" onclick="filterByDistrict('黃圃鎮')">
            <area shape="rect" coords="150,130,220,170" alt="南頭鎮" title="南頭鎮" href="javascript:void(0);" onclick="filterByDistrict('南頭鎮')">
            <area shape="rect" coords="110,160,190,220" alt="東鳳鎮" title="東鳳鎮" href="javascript:void(0);" onclick="filterByDistrict('東鳳鎮')">
            <area shape="rect" coords="310,150,420,230" alt="三角鎮" title="三角鎮" href="javascript:void(0);" onclick="filterByDistrict('三角鎮')">
            <area shape="rect" coords="220,180,300,240" alt="阜沙鎮" title="阜沙鎮" href="javascript:void(0);" onclick="filterByDistrict('阜沙鎮')">
            
            <!-- 中部及西部 -->
            <area shape="rect" coords="50,220,140,300" alt="小欖鎮" title="小欖鎮" href="javascript:void(0);" onclick="filterByDistrict('小欖鎮')">
            <area shape="rect" coords="140,240,220,320" alt="東升鎮" title="東升鎮" href="javascript:void(0);" onclick="filterByDistrict('東升鎮')">
            <area shape="rect" coords="10,250,50,330" alt="古鎮鎮" title="古鎮鎮" href="javascript:void(0);" onclick="filterByDistrict('古鎮鎮')">
            <area shape="rect" coords="40,320,150,410" alt="橫欄鎮" title="橫欄鎮" href="javascript:void(0);" onclick="filterByDistrict('橫欄鎮')">
            <area shape="rect" coords="230,260,340,320" alt="港口鎮" title="港口鎮" href="javascript:void(0);" onclick="filterByDistrict('港口鎮')">
            <area shape="rect" coords="380,240,540,350" alt="民眾鎮" title="民眾鎮" href="javascript:void(0);" onclick="filterByDistrict('民眾鎮')">

            <!-- 核心區域 -->
            <area shape="rect" coords="190,320,260,380" alt="西區" title="西區" href="javascript:void(0);" onclick="filterByDistrict('西區')">
            <area shape="rect" coords="260,340,320,410" alt="石岐區" title="石岐區" href="javascript:void(0);" onclick="filterByDistrict('石岐區')">
            <area shape="rect" coords="300,410,400,500" alt="東區" title="東區" href="javascript:void(0);" onclick="filterByDistrict('東區')">
            <area shape="rect" coords="190,430,270,520" alt="南區" title="南區" href="javascript:void(0);" onclick="filterByDistrict('南區')">
            <area shape="rect" coords="350,360,510,460" alt="火炬開發區" title="火炬開發區" href="javascript:void(0);" onclick="filterByDistrict('火炬開發區')">
            <area shape="rect" coords="530,370,600,470" alt="馬鞍島" title="馬鞍島" href="javascript:void(0);" onclick="filterByDistrict('馬鞍島')">
            
            <!-- 南部 -->
            <area shape="rect" coords="130,410,210,480" alt="沙溪鎮" title="沙溪鎮" href="javascript:void(0);" onclick="filterByDistrict('沙溪鎮')">
            <area shape="rect" coords="110,480,180,550" alt="大涌鎮" title="大涌鎮" href="javascript:void(0);" onclick="filterByDistrict('大涌鎮')">
            <area shape="rect" coords="440,460,560,580" alt="南朗鎮" title="南朗鎮" href="javascript:void(0);" onclick="filterByDistrict('南朗鎮')">
            <area shape="rect" coords="310,540,450,620" alt="五桂山鎮" title="五桂山鎮" href="javascript:void(0);" onclick="filterByDistrict('五桂山鎮')">
            <area shape="rect" coords="140,560,250,650" alt="板芙鎮" title="板芙鎮" href="javascript:void(0);" onclick="filterByDistrict('板芙鎮')">
            <area shape="rect" coords="260,630,390,720" alt="三鄉鎮" title="三鄉鎮" href="javascript:void(0);" onclick="filterByDistrict('三鄉鎮')">
            <area shape="rect" coords="170,680,240,780" alt="神灣鎮" title="神灣鎮" href="javascript:void(0);" onclick="filterByDistrict('神灣鎮')">
            <area shape="rect" coords="260,730,410,870" alt="坦洲鎮" title="坦洲鎮" href="javascript:void(0);" onclick="filterByDistrict('坦洲鎮')">
        </map>
    </div>

    <!-- 地區選擇欄 (改成多行顯示，方便睇晒25區) -->
    <div class="bg-white shadow-sm sticky top-[60px] z-10 border-b border-gray-100">
        <div class="max-w-4xl mx-auto px-4 py-3 flex flex-wrap gap-2" id="district-filters">
            <!-- 由 JavaScript 自動生成 -->
        </div>
    </div>

    <!-- 餐廳列表 -->
    <main class="max-w-4xl mx-auto p-4">
        <div id="loader" class="text-center py-10 text-gray-500">正在同步中山美食數據...</div>
        <div id="restaurantGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <!-- 餐廳卡片 -->
        </div>
    </main>

    <footer class="text-center py-8 text-gray-400 text-xs px-4">
        <p>© 2026 中山美食地圖</p>
        <p class="mt-2 text-[10px]">本程式與所有 iPhone 型號完全兼容</p>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/image-map-resizer/1.0.10/js/imageMapResizer.min.js"></script>
    <script>
        const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTtli5qEDucHqpfVOHASkAfbxHIeC7_krqoVPnrRA1b83VfdqaAnlHNPmLKkwJyLpPC1O7AHr5wFQg7/pub?output=csv';
        
        let allData = [];
        let currentDistrict = '全部';

        // 寫死 25 區 (確保名單齊全)
        const ALL_DISTRICTS = [
            "石岐區", "東區", "西區", "南區", "五桂山鎮", "火炬開發區", 
            "黃圃鎮", "南頭鎮", "東鳳鎮", "阜沙鎮", "小欖鎮", "東升鎮", "古鎮鎮",
            "橫欄鎮", "三角鎮", "民眾鎮", "南朗鎮", "港口鎮", "大涌鎮", "沙溪鎮",
            "三鄉鎮", "板芙鎮", "神灣鎮", "坦洲鎮"
        ];

        async function init() {
            Papa.parse(sheetUrl, {
                download: true,
                header: true,
                complete: function(results) {
                    allData = results.data.filter(item => item['Restaurant Name'] && typeof item['Restaurant Name'] === 'string' && item['Restaurant Name'].trim() !== ''); 
                    
                    generateDistrictButtons();
                    renderData(allData);
                    document.getElementById('loader').classList.add('hidden');
                    
                    // 確保 Image Map 喺手機縮放時坐標跟住縮放
                    imageMapResize(); 
                }
            });
        }

        function generateDistrictButtons() {
            const filterContainer = document.getElementById('district-filters');
            let html = `<button onclick="filterByDistrict('全部')" class="district-btn active-btn px-4 py-1 bg-orange-500 text-white rounded-full text-sm font-medium whitespace-nowrap" data-district="全部">全部</button>`;
            
            ALL_DISTRICTS.forEach(district => {
                html += `<button onclick="filterByDistrict('${district}')" class="district-btn px-4 py-1 bg-gray-200 text-gray-700 rounded-full text-sm font-medium whitespace-nowrap" data-district="${district}">${district}</button>`;
            });
            filterContainer.innerHTML = html;
        }

        window.filterByDistrict = function(district) {
            currentDistrict = district;
            
            document.querySelectorAll('.district-btn').forEach(btn => {
                if(btn.getAttribute('data-district') === district) {
                    btn.classList.replace('bg-gray-200', 'bg-orange-500');
                    btn.classList.replace('text-gray-700', 'text-white');
                } else {
                    btn.classList.replace('bg-orange-500', 'bg-gray-200');
                    btn.classList.replace('text-white', 'text-gray-700');
                }
            });

            applyFilters();
            
            // 點擊地圖後自動滾動到餐廳列表
            if(district !== '全部') {
                document.getElementById('district-filters').scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        document.getElementById('searchInput').addEventListener('input', applyFilters);

        function applyFilters() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allData.filter(item => {
                const matchDistrict = currentDistrict === '全部' || item['District'] === currentDistrict;
                const matchSearch = item['Restaurant Name'].toLowerCase().includes(searchTerm) || 
                                   (item['Highlight'] && item['Highlight'].toLowerCase().includes(searchTerm)) ||
                                   (item['Category'] && item['Category'].toLowerCase().includes(searchTerm));
                return matchDistrict && matchSearch;
            });
            renderData(filtered);
        }

        function renderData(data) {
            const container = document.getElementById('restaurantGrid');
            if (data.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center text-gray-500 py-10">此地區暫未有餐廳資料</div>`;
                return;
            }

            container.innerHTML = data.map(item => `
                <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 flex flex-col hover:shadow-md transition">
                    <div class="flex justify-between items-start mb-2">
                        <div>
                            <h2 class="text-lg font-bold text-gray-900">${item['Restaurant Name']}</h2>
                            <p class="text-xs text-orange-500 font-medium">${item['Branch'] || ''}</p>
                        </div>
                        <span class="bg-orange-50 text-orange-600 text-[10px] px-2 py-0.5 rounded-full font-bold">
                            ${item['District']}
                        </span>
                    </div>
                    
                    <div class="flex flex-wrap gap-1 mb-3">
                        <span class="bg-gray-100 text-gray-600 text-[10px] px-2 py-0.5 rounded">${item['Category'] || '美食'}</span>
                        <span class="bg-blue-50 text-blue-600 text-[10px] px-2 py-0.5 rounded">人均: ${item['Avg Cost'] || '--'}</span>
                    </div>

                    <p class="text-gray-700 text-sm leading-relaxed mb-4">
                        <span class="text-orange-500 font-bold">●</span> ${item['Highlight'] || '暫無特色描述'}
                    </p>

                    <div class="mt-auto pt-3 border-t border-gray-50 flex justify-between items-center">
                        <p class="text-gray-400 text-[10px] truncate max-w-[70%]">📍 ${item['Address'] || '請查看導航'}</p>
                        ${item['Amap URL'] ? `
                            <a href="${item['Amap URL']}" target="_blank" class="text-blue-500 text-xs font-bold flex items-center">
                                導航 <svg class="w-3 h-3 ml-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </a>
                        ` : ''}
                    </div>
                </div>
            `).join('');
        }

        init();
    </script>
</body>
</html>
